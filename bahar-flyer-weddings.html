<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding & Engagement — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
      .screen-only { display: none; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #1c2018;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }
    /* Film grain */
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 3;
    }
    /* Vignette */
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(16, 19, 12, 0.35) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* Decorative frame */
    .frame {
      position: absolute;
      inset: 0.65in;
      border: 1px solid #3a4034;
      pointer-events: none;
      z-index: 2;
    }
    .frame::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 28px; height: 28px;
      border-top: 1px solid #c97b2a;
      border-left: 1px solid #c97b2a;
    }
    .frame::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 28px; height: 28px;
      border-bottom: 1px solid #c97b2a;
      border-right: 1px solid #c97b2a;
    }

    /* Content container */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.4in 1.2in;
      z-index: 2;
    }

    /* Warm glow */
    .warm-glow {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5in;
      height: 5in;
      background: radial-gradient(ellipse, rgba(201, 123, 42, 0.02) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      opacity: 0.7;
    }

    .spacer-top { flex: 1; }

    .category-label {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a9878;
      margin-bottom: 56px;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 72px;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: #e8dfd4;
    }
    .headline-ampersand {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: 42px;
      line-height: 1;
      letter-spacing: 0;
      color: #8a9878;
      margin: 12px 0 8px 0;
    }

    /* Ornamental divider: line — dot — line */
    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 52px 0 44px 0;
    }
    .ornament-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, #3a4034);
    }
    .ornament-line:last-child {
      background: linear-gradient(to left, transparent, #3a4034);
    }
    .ornament-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c97b2a;
    }

    .body-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 17px;
      line-height: 1.7;
      color: #8a9878;
      max-width: 4in;
    }

    .spacer-bottom { flex: 1; }

    /* Bottom row */
    .bottom-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      width: 100%;
    }
    .contact-block {
      text-align: left;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
      display: block;
      margin-bottom: 4px;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="warm-glow"></div>
    <div class="frame"></div>

    <div class="content">
      <div class="wordmark">Bahar Studio</div>

      <div class="spacer-top"></div>

      <div class="category-label">Wedding &amp; Engagement</div>

      <div class="headline">
        <span>Wedding</span>
        <span class="headline-ampersand">&amp;</span>
        <span>Engagement</span>
      </div>

      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line"></div>
      </div>

      <p class="body-text">Every love story deserves to be held — not just in memory, but in light, in stillness, in a frame that honors who you are together.</p>

      <div class="spacer-bottom"></div>

      <div class="bottom-row">
        <div class="contact-block">
          <span class="contact-item">baharstudio.com</span>
          <span class="contact-item">@baharstudio</span>
        </div>
        <div class="qr-section">
          <div class="qr-wrapper">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://baharstudio.com/book&format=png&qzone=1" alt="Scan to book" />
          </div>
          <span class="qr-label">Scan to begin your story</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

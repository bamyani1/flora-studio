<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Portraits — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #242820;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 4;
    }
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(16, 19, 12, 0.3) 100%);
      pointer-events: none;
      z-index: 4;
    }

    /* Warm glow */
    .warm-glow {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6in;
      height: 6in;
      background: radial-gradient(ellipse, rgba(201, 123, 42, 0.025) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative frame */
    .frame {
      position: absolute;
      inset: 0.65in;
      border: 1px solid #3a4034;
      pointer-events: none;
      z-index: 2;
    }
    .frame::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 28px; height: 28px;
      border-top: 1px solid #c97b2a;
      border-left: 1px solid #c97b2a;
    }
    .frame::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 28px; height: 28px;
      border-bottom: 1px solid #c97b2a;
      border-right: 1px solid #c97b2a;
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.1in 1.1in;
      z-index: 3;
    }

    .top-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-ornament {
      width: 110px;
      opacity: 0.4;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      opacity: 0.8;
    }

    /* Photo inset */
    .photo-inset {
      width: 3.8in;
      height: 3.8in;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #3a4034;
      margin-bottom: 36px;
      flex-shrink: 0;
    }
    .photo-inset img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 52px;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #e8dfd4;
      text-align: center;
      margin-bottom: 8px;
    }
    .headline em {
      font-style: italic;
      font-weight: 300;
    }

    .body-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 15px;
      line-height: 1.7;
      color: #8a9878;
      text-align: center;
      max-width: 4in;
      margin-top: 20px;
    }

    .spacer { flex: 1; }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
    }
    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>

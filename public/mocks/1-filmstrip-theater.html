<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Night — Silk Road Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#121212;
    --surface:#1a1a1a;
    --surface-el:#222222;
    --accent:#c4973b;
    --accent-muted:#a07830;
    --text:#f5f0eb;
    --muted:#8b7355;
    --border:#2e2e2e;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }

  html{
    overflow-x:hidden;
    scrollbar-width:none;
  }
  html::-webkit-scrollbar{display:none}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden;
  }

  /* ── Film grain overlay ── */
  body::after{
    content:'';
    position:fixed;
    inset:0;
    z-index:9999;
    pointer-events:none;
    opacity:0.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:200px 200px;
  }

  /* ── Scroll wrapper — sets the scroll distance ── */
  .scroll-wrapper{
    position:relative;
    width:100%;
  }

  /* ── Pinned viewport ── */
  .theater{
    position:fixed;
    top:0;left:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    z-index:1;
  }

  /* ── Album title ── */
  .album-title{
    position:absolute;
    top:32px;left:40px;
    z-index:10;
    font-family:'Inter',system-ui,sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text);
    transition:opacity 0.8s var(--ease);
  }
  .album-title.faded{
    opacity:0.3;
  }

  /* ── Film-strip sprocket borders ── */
  .sprocket-strip{
    position:absolute;
    left:0;
    width:100%;
    height:18px;
    z-index:5;
    display:flex;
    align-items:center;
    gap:0;
    overflow:hidden;
  }
  .sprocket-strip.top{top:0}
  .sprocket-strip.bottom{bottom:0}

  .sprocket-strip::before{
    content:'';
    position:absolute;
    inset:0;
    background:var(--bg);
    border-bottom:1px solid rgba(46,46,46,0.4);
  }
  .sprocket-strip.bottom::before{
    border-bottom:none;
    border-top:1px solid rgba(46,46,46,0.4);
  }

  .sprocket-hole{
    position:relative;
    z-index:1;
    width:12px;
    height:8px;
    border-radius:2px;
    border:1px solid rgba(46,46,46,0.4);
    background:transparent;
    flex-shrink:0;
    margin:0 28px;
  }

  /* ── Track (horizontal container) ── */
  .track{
    position:absolute;
    top:0;left:0;
    height:100vh;
    display:flex;
    align-items:center;
    gap:0;
    padding:0 8vw;
    will-change:transform;
  }

  /* ── Image frames ── */
  .frame{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    padding:0 4vw;
    will-change:transform;
  }

  .frame img{
    display:block;
    height:75vh;
    width:auto;
    max-width:72vw;
    object-fit:contain;
    border-radius:2px;
    box-shadow:
      inset 0 0 80px rgba(20,15,8,0.5),
      0 0 60px rgba(0,0,0,0.6);
    filter:brightness(0.97) contrast(1.02);
    transition:filter 0.6s var(--ease);
  }

  /* warm vignette via a wrapper */
  .frame-inner{
    position:relative;
    line-height:0;
  }
  .frame-inner::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:2px;
    box-shadow:inset 0 0 100px rgba(30,20,8,0.35);
    pointer-events:none;
  }

  /* ── Counter ── */
  .counter{
    position:fixed;
    bottom:40px;right:44px;
    z-index:10;
    font-family:'Inter',system-ui,sans-serif;
    font-size:13px;
    font-weight:400;
    letter-spacing:0.16em;
    text-transform:uppercase;
  }
  .counter .current{
    color:var(--accent);
    font-weight:500;
  }
  .counter .divider{
    color:var(--muted);
    margin:0 6px;
  }
  .counter .total{
    color:var(--muted);
  }

  /* ── Progress rail ── */
  .progress-rail{
    position:fixed;
    bottom:0;left:0;
    width:100%;
    height:2px;
    background:var(--border);
    z-index:10;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:width 0.1s linear;
  }

  /* ── Loading state ── */
  .theater{
    opacity:0;
    animation:fadeInTheater 1.2s var(--ease) 0.3s forwards;
  }
  @keyframes fadeInTheater{
    to{opacity:1}
  }

  .frame{
    opacity:0;
    animation:fadeInFrame 0.8s var(--ease) forwards;
  }
  .frame:nth-child(1){animation-delay:0.5s}
  .frame:nth-child(2){animation-delay:0.65s}
  .frame:nth-child(3){animation-delay:0.8s}
  .frame:nth-child(4){animation-delay:0.95s}
  .frame:nth-child(5){animation-delay:1.1s}
  .frame:nth-child(6){animation-delay:1.25s}
  .frame:nth-child(7){animation-delay:1.4s}

  @keyframes fadeInFrame{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>

<div class="scroll-wrapper" id="scrollWrapper">

  <div class="theater" id="theater">

    <!-- Album title -->
    <div class="album-title" id="albumTitle">Senior Night</div>

    <!-- Sprocket strips -->
    <div class="sprocket-strip top" id="sprocketsTop"></div>
    <div class="sprocket-strip bottom" id="sprocketsBottom"></div>

    <!-- Horizontal track -->
    <div class="track" id="track">
      <div class="frame" data-speed="0.92">
        <div class="frame-inner">
          <img src="/images/senior-night/01.jpg" alt="Senior Night 01" loading="eager">
        </div>
      </div>
      <div class="frame" data-speed="1.05">
        <div class="frame-inner">
          <img src="/images/senior-night/02.jpg" alt="Senior Night 02">
        </div>
      </div>
      <div class="frame" data-speed="0.95">
        <div class="frame-inner">
          <img src="/images/senior-night/03.jpg" alt="Senior Night 03">
        </div>
      </div>
      <div class="frame" data-speed="1.08">
        <div class="frame-inner">
          <img src="/images/senior-night/04.jpg" alt="Senior Night 04">
        </div>
      </div>
      <div class="frame" data-speed="0.93">
        <div class="frame-inner">
          <img src="/images/senior-night/05.jpg" alt="Senior Night 05">
        </div>
      </div>
      <div class="frame" data-speed="1.04">
        <div class="frame-inner">
          <img src="/images/senior-night/06.jpg" alt="Senior Night 06">
        </div>
      </div>
      <div class="frame" data-speed="0.97">
        <div class="frame-inner">
          <img src="/images/senior-night/07.jpg" alt="Senior Night 07">
        </div>
      </div>
    </div>

    <!-- Counter -->
    <div class="counter" id="counter">
      <span class="current" id="counterCurrent">01</span>
      <span class="divider">/</span>
      <span class="total">07</span>
    </div>

    <!-- Progress rail -->
    <div class="progress-rail">
      <div class="progress-fill" id="progressFill"></div>
    </div>

  </div>

</div>

<script>
(function(){
  var track = document.getElementById('track');
  var scrollWrapper = document.getElementById('scrollWrapper');
  var albumTitle = document.getElementById('albumTitle');
  var counterCurrent = document.getElementById('counterCurrent');
  var progressFill = document.getElementById('progressFill');
  var frames = document.querySelectorAll('.frame');
  var totalImages = frames.length;

  // Generate sprocket holes using DOM methods (safe, no innerHTML)
  function generateSprockets(){
    var topStrip = document.getElementById('sprocketsTop');
    var bottomStrip = document.getElementById('sprocketsBottom');
    var count = Math.ceil(window.innerWidth / 40) + 10;
    for(var i = 0; i < count; i++){
      var holeT = document.createElement('div');
      holeT.className = 'sprocket-hole';
      topStrip.appendChild(holeT);
      var holeB = document.createElement('div');
      holeB.className = 'sprocket-hole';
      bottomStrip.appendChild(holeB);
    }
  }

  function clearSprockets(){
    var topStrip = document.getElementById('sprocketsTop');
    var bottomStrip = document.getElementById('sprocketsBottom');
    while(topStrip.firstChild && !topStrip.firstChild.classList){
      topStrip.removeChild(topStrip.firstChild);
    }
    while(topStrip.firstChild){
      topStrip.removeChild(topStrip.firstChild);
    }
    while(bottomStrip.firstChild){
      bottomStrip.removeChild(bottomStrip.firstChild);
    }
  }

  generateSprockets();

  // Measure and set scroll distance
  function measure(){
    var trackWidth = track.scrollWidth;
    var viewportWidth = window.innerWidth;
    // The scroll distance is the amount the track needs to move
    // so that the last image is fully visible
    var maxScroll = trackWidth - viewportWidth;
    // The wrapper height = viewport + scroll distance
    // This ensures when we scroll to the bottom, the track is fully translated
    scrollWrapper.style.height = (window.innerHeight + maxScroll) + 'px';
    return maxScroll;
  }

  var maxScroll = measure();

  // Scroll handler
  var ticking = false;
  var currentTranslateX = 0;
  var targetTranslateX = 0;

  function onScroll(){
    if(!ticking){
      requestAnimationFrame(update);
      ticking = true;
    }
  }

  function update(){
    ticking = false;
    var scrollY = window.pageYOffset || document.documentElement.scrollTop;
    var progress = Math.min(Math.max(scrollY / maxScroll, 0), 1);

    // Main track translation
    targetTranslateX = -progress * maxScroll;

    // Smooth interpolation
    currentTranslateX += (targetTranslateX - currentTranslateX) * 0.12;

    track.style.transform = 'translate3d(' + currentTranslateX + 'px, 0, 0)';

    // Parallax per frame
    frames.forEach(function(frame){
      var speed = parseFloat(frame.getAttribute('data-speed')) || 1;
      var offset = (1 - speed) * scrollY * 0.3;
      frame.style.transform = 'translate3d(' + offset + 'px, 0, 0)';
    });

    // Update counter
    var imageIndex = Math.min(
      Math.floor(progress * totalImages),
      totalImages - 1
    );
    var num = String(imageIndex + 1).padStart(2, '0');
    if(counterCurrent.textContent !== num){
      counterCurrent.textContent = num;
    }

    // Update progress rail
    progressFill.style.width = (progress * 100) + '%';

    // Fade album title after first image scrolls past
    if(progress > 0.08){
      albumTitle.classList.add('faded');
    } else {
      albumTitle.classList.remove('faded');
    }

    // Keep animating for smooth interpolation
    if(Math.abs(targetTranslateX - currentTranslateX) > 0.5){
      requestAnimationFrame(update);
    }
  }

  window.addEventListener('scroll', onScroll, {passive: true});

  // Continuously animate for smoothness
  function smoothLoop(){
    if(Math.abs(targetTranslateX - currentTranslateX) > 0.5){
      currentTranslateX += (targetTranslateX - currentTranslateX) * 0.12;
      track.style.transform = 'translate3d(' + currentTranslateX + 'px, 0, 0)';

      frames.forEach(function(frame){
        var speed = parseFloat(frame.getAttribute('data-speed')) || 1;
        var scrollY = window.pageYOffset || document.documentElement.scrollTop;
        var offset = (1 - speed) * scrollY * 0.3;
        frame.style.transform = 'translate3d(' + offset + 'px, 0, 0)';
      });
    }
    requestAnimationFrame(smoothLoop);
  }
  requestAnimationFrame(smoothLoop);

  // Recalculate on resize
  window.addEventListener('resize', function(){
    maxScroll = measure();
    clearSprockets();
    generateSprockets();
  });

  // Initial measure after images may have loaded
  window.addEventListener('load', function(){
    maxScroll = measure();
    update();
  });

})();
</script>

</body>
</html>

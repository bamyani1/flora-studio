<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine-Reel Carousel — Saffron Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0a0a0a;
    --surface:#1a1a1a;
    --gold:#c4973b;
    --gold-muted:#a07830;
    --text:#f5f0eb;
    --muted:#8b7355;
    --border:#2e2e2e;
    --font-display:"Georgia",serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }

  html{background:var(--bg);color:var(--text);scroll-behavior:smooth}
  body{background:var(--bg);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}

  /* ── film grain overlay ── */
  body::after{
    content:"";position:fixed;inset:0;z-index:9999;pointer-events:none;
    opacity:0.04;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
  }

  /* ── label style ── */
  .label{
    font-family:var(--font-body);
    text-transform:uppercase;
    letter-spacing:0.16em;
    font-size:13px;
    font-weight:400;
  }

  /* ───────────────────────────────────
     HEADER
  ─────────────────────────────────── */
  .album-header{
    min-height:45vh;
    display:flex;flex-direction:column;
    justify-content:flex-end;
    padding:0 64px 48px;
    position:relative;
  }
  .album-header::after{
    content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
    background:var(--border);
  }
  .album-header .kicker{
    color:var(--muted);margin-bottom:16px;
  }
  .album-header h1{
    font-family:var(--font-display);
    font-weight:400;font-style:italic;
    font-size:clamp(42px,6vw,80px);
    line-height:1.05;letter-spacing:-0.02em;
    color:var(--text);margin-bottom:20px;
  }
  .album-meta{display:flex;gap:40px;align-items:center}
  .album-meta span{color:var(--muted)}
  .album-meta .divider{width:1px;height:14px;background:var(--border)}
  .album-header .scroll-hint{
    position:absolute;bottom:48px;right:64px;
    color:var(--muted);display:flex;align-items:center;gap:10px;
    animation:hintPulse 2.4s var(--ease) infinite;
  }
  .scroll-hint svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.5}
  @keyframes hintPulse{
    0%,100%{opacity:.5;transform:translateX(0)}
    50%{opacity:1;transform:translateX(6px)}
  }

  /* ───────────────────────────────────
     GALLERY (horizontal scroll)
  ─────────────────────────────────── */
  .gallery-section{
    position:relative;
    height:100vh;
    overflow:hidden;
  }

  .gallery-track{
    height:100%;
    overflow-x:scroll;
    overflow-y:hidden;
    display:flex;
    align-items:center;
    gap:24px;
    padding:0 80px;
    cursor:grab;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }
  .gallery-track::-webkit-scrollbar{display:none}
  .gallery-track.is-dragging{cursor:grabbing}

  /* film-strip rails */
  .film-rail{
    position:absolute;
    left:0;right:0;
    height:20px;
    background:var(--surface);
    z-index:2;
    pointer-events:none;
    overflow:hidden;
  }
  .film-rail--top{top:calc(50% - 40vh - 20px)}
  .film-rail--bottom{top:calc(50% + 40vh)}

  .film-rail .sprockets{
    display:flex;
    align-items:center;
    height:100%;
    gap:42px;
    padding:0 21px;
  }
  .film-rail .sprocket{
    flex-shrink:0;
    width:6px;height:10px;
    border-radius:1.5px;
    background:var(--bg);
  }

  /* edge vignettes */
  .gallery-section::before,
  .gallery-section::after{
    content:"";position:absolute;top:0;bottom:0;width:80px;z-index:3;pointer-events:none;
  }
  .gallery-section::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
  .gallery-section::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}

  /* individual frame */
  .frame{
    flex-shrink:0;
    height:80vh;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    will-change:transform,opacity;
    transition:opacity 0.6s var(--ease),transform 0.6s var(--ease);
    opacity:0.6;
    transform:scale(1.03);
  }
  .frame.is-visible{opacity:1;transform:scale(1)}
  .frame img{
    display:block;
    height:80vh;
    width:auto;
    object-fit:contain;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  /* ── HUD overlays (fixed during gallery scroll) ── */
  .hud{
    position:absolute;
    z-index:4;
    pointer-events:none;
  }
  .hud--title{top:28px;left:40px}
  .hud--count{top:28px;right:40px;color:var(--muted)}
  .hud--frame{
    bottom:28px;left:50%;transform:translateX(-50%);
    color:var(--gold-muted);
    font-variant-numeric:tabular-nums;
  }

  /* ───────────────────────────────────
     FOOTER
  ─────────────────────────────────── */
  .album-footer{
    padding:64px;
    border-top:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  .album-footer .nav-link{
    color:var(--muted);text-decoration:none;
    display:flex;align-items:center;gap:10px;
    transition:color 0.4s var(--ease);
  }
  .album-footer .nav-link:hover{color:var(--gold)}
  .album-footer .nav-link svg{
    width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;
    transition:transform 0.4s var(--ease);
  }
  .album-footer .nav-link:hover svg.arrow-left{transform:translateX(-4px)}
  .album-footer .nav-link:hover svg.arrow-right{transform:translateX(4px)}
  .album-footer .studio-mark{
    font-family:var(--font-display);font-style:italic;
    color:var(--border);font-size:14px;
  }

  /* ── selection ── */
  ::selection{background:var(--gold);color:var(--bg)}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     ALBUM HEADER
════════════════════════════════════ -->
<section class="album-header">
  <p class="label kicker">Saffron Studios</p>
  <h1>Senior Night</h1>
  <div class="album-meta">
    <span class="label">2024</span>
    <span class="divider"></span>
    <span class="label" style="color:var(--gold-muted)">7 Frames</span>
    <span class="divider"></span>
    <span class="label">Portrait &amp; Ceremony</span>
  </div>
  <div class="scroll-hint label">
    Scroll to view
    <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </div>
</section>

<!-- ════════════════════════════════════
     GALLERY
════════════════════════════════════ -->
<section class="gallery-section" id="gallery">

  <!-- HUD overlays -->
  <div class="hud hud--title label">Senior Night</div>
  <div class="hud hud--count label">7 Frames</div>
  <div class="hud hud--frame label" id="frameIndicator">Frame 01</div>

  <!-- Film rails -->
  <div class="film-rail film-rail--top"><div class="sprockets" id="sprocketsTop"></div></div>
  <div class="film-rail film-rail--bottom"><div class="sprockets" id="sprocketsBottom"></div></div>

  <!-- Scrollable track -->
  <div class="gallery-track" id="track">
    <div class="frame" data-index="1"><img src="/images/senior-night/01.jpg" alt="Frame 01" draggable="false"></div>
    <div class="frame" data-index="2"><img src="/images/senior-night/02.jpg" alt="Frame 02" draggable="false"></div>
    <div class="frame" data-index="3"><img src="/images/senior-night/03.jpg" alt="Frame 03" draggable="false"></div>
    <div class="frame" data-index="4"><img src="/images/senior-night/04.jpg" alt="Frame 04" draggable="false"></div>
    <div class="frame" data-index="5"><img src="/images/senior-night/05.jpg" alt="Frame 05" draggable="false"></div>
    <div class="frame" data-index="6"><img src="/images/senior-night/06.jpg" alt="Frame 06" draggable="false"></div>
    <div class="frame" data-index="7"><img src="/images/senior-night/07.jpg" alt="Frame 07" draggable="false"></div>
  </div>

</section>

<!-- ════════════════════════════════════
     FOOTER
════════════════════════════════════ -->
<section class="album-footer">
  <a href="#" class="nav-link label">
    <svg class="arrow-left" viewBox="0 0 24 24"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    Previous Album
  </a>
  <span class="studio-mark">Saffron Studios</span>
  <a href="#" class="nav-link label">
    Next Album
    <svg class="arrow-right" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </a>
</section>

<script>
(function(){
  var track = document.getElementById('track');
  var frameIndicator = document.getElementById('frameIndicator');
  var frames = document.querySelectorAll('.frame');

  /* ── Sprocket generation ── */
  function buildSprockets(container, count){
    while(container.firstChild) container.removeChild(container.firstChild);
    for(var i = 0; i < count; i++){
      var s = document.createElement('span');
      s.className = 'sprocket';
      container.appendChild(s);
    }
  }

  function fillSprockets(){
    var w = Math.max(track.scrollWidth, window.innerWidth);
    var count = Math.ceil(w / 48);
    buildSprockets(document.getElementById('sprocketsTop'), count);
    buildSprockets(document.getElementById('sprocketsBottom'), count);
  }

  window.addEventListener('load', fillSprockets);
  window.addEventListener('resize', fillSprockets);

  /* ── Mouse-wheel to horizontal scroll ── */
  track.addEventListener('wheel', function(e){
    e.preventDefault();
    track.scrollLeft += e.deltaY;
  }, {passive:false});

  /* ── Drag to scroll with momentum ── */
  var isDragging = false;
  var startX = 0;
  var scrollStart = 0;
  var velX = 0;
  var lastX = 0;
  var lastTime = 0;
  var momentumRAF = null;

  track.addEventListener('mousedown', function(e){
    isDragging = true;
    startX = e.pageX;
    scrollStart = track.scrollLeft;
    lastX = e.pageX;
    lastTime = Date.now();
    velX = 0;
    track.classList.add('is-dragging');
    if(momentumRAF) cancelAnimationFrame(momentumRAF);
    e.preventDefault();
  });

  window.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var x = e.pageX;
    var dx = x - startX;
    track.scrollLeft = scrollStart - dx;

    var now = Date.now();
    var dt = now - lastTime;
    if(dt > 0){
      velX = (lastX - x) / dt * 16;
    }
    lastX = x;
    lastTime = now;
  });

  window.addEventListener('mouseup', function(){
    if(!isDragging) return;
    isDragging = false;
    track.classList.remove('is-dragging');
    applyMomentum();
  });

  function applyMomentum(){
    var friction = 0.94;
    function step(){
      if(Math.abs(velX) < 0.3) return;
      track.scrollLeft += velX;
      velX *= friction;
      momentumRAF = requestAnimationFrame(step);
    }
    momentumRAF = requestAnimationFrame(step);
  }

  /* ── Scroll-in reveal + frame indicator ── */
  function onScroll(){
    var trackRect = track.getBoundingClientRect();
    var center = trackRect.left + trackRect.width / 2;
    var closest = null;
    var closestDist = Infinity;

    frames.forEach(function(frame){
      var rect = frame.getBoundingClientRect();
      var frameCenter = rect.left + rect.width / 2;

      if(rect.right > trackRect.left && rect.left < trackRect.right){
        var enter = (trackRect.right - rect.left) / (trackRect.width * 0.5);
        var t = Math.min(Math.max(enter, 0), 1);
        frame.style.opacity = String(0.6 + 0.4 * t);
        frame.style.transform = 'scale(' + (1.03 - 0.03 * t) + ')';
        if(t > 0.5) frame.classList.add('is-visible');
        else frame.classList.remove('is-visible');
      } else {
        frame.style.opacity = '0.6';
        frame.style.transform = 'scale(1.03)';
        frame.classList.remove('is-visible');
      }

      var dist = Math.abs(frameCenter - center);
      if(dist < closestDist){
        closestDist = dist;
        closest = frame;
      }
    });

    if(closest){
      var idx = closest.getAttribute('data-index');
      frameIndicator.textContent = 'Frame ' + (idx.length < 2 ? '0' + idx : idx);
    }
  }

  track.addEventListener('scroll', onScroll);
  window.addEventListener('resize', onScroll);
  window.addEventListener('load', function(){ requestAnimationFrame(onScroll); });

  /* ── Touch support ── */
  var touchStartX = 0;
  var touchScrollStart = 0;

  track.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].pageX;
    touchScrollStart = track.scrollLeft;
  }, {passive:true});

  track.addEventListener('touchmove', function(e){
    var dx = e.touches[0].pageX - touchStartX;
    track.scrollLeft = touchScrollStart - dx;
  }, {passive:true});

})();
</script>

</body>
</html>

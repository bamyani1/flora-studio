<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staggered Editorial — Saffron Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
  }

  body {
    background-color: #121212;
    color: #f5f0eb;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Film grain overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  .gallery-wrapper {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 clamp(24px, 4vw, 64px);
    padding-bottom: 160px;
  }

  /* Album header */
  .album-header {
    padding-top: clamp(100px, 16vh, 200px);
    padding-bottom: clamp(80px, 10vh, 140px);
    text-align: center;
  }

  .album-title {
    font-family: 'Georgia', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(36px, 5.6vw, 56px);
    color: #f5f0eb;
    letter-spacing: 0.01em;
    line-height: 1.15;
    margin-bottom: 24px;
  }

  .album-meta {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #8b7355;
  }

  /* Image container base */
  .image-block {
    position: relative;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: opacity, transform;
  }

  .image-block.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  .image-block img {
    display: block;
    width: 100%;
    height: auto;
    border: 1px solid rgba(46, 46, 46, 0.3);
    background-color: #1a1a1a;
  }

  /* Image number labels */
  .image-number {
    position: absolute;
    top: -28px;
    left: 0;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #8b7355;
    user-select: none;
  }

  /* Layout: Image 01 — Full-width hero */
  .image-block--01 {
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 140px;
  }

  /* Layout: Image 02 — Right-aligned medium */
  .image-block--02 {
    width: 55%;
    margin-left: auto;
    margin-right: 0;
    margin-bottom: 120px;
  }

  /* Divider between 02 and 03 */
  .divider {
    width: 30%;
    height: 1px;
    background-color: rgba(196, 151, 59, 0.12);
    margin: 0 auto;
    opacity: 0;
    transform: scaleX(0);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s,
                transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
  }

  .divider.revealed {
    opacity: 1;
    transform: scaleX(1);
  }

  .divider--top {
    margin-bottom: 120px;
  }

  .divider--bottom {
    margin-bottom: 120px;
  }

  /* Layout: Image 03 + 04 — Diptych pair */
  .diptych {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 140px;
  }

  .diptych .image-block {
    width: calc(50% - 0.75rem);
    flex: 0 0 calc(50% - 0.75rem);
  }

  .diptych .image-block:nth-child(2) {
    transition-delay: 0.12s;
  }

  /* Layout: Image 05 — Left-aligned large */
  .image-block--05 {
    width: 65%;
    margin-left: 0;
    margin-right: auto;
    margin-bottom: 120px;
  }

  /* Layout: Image 06 — Centered medium */
  .image-block--06 {
    width: 45%;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 160px;
  }

  /* Layout: Image 07 — Full-width closer */
  .image-block--07 {
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 0;
  }

  /* End mark */
  .end-mark {
    text-align: center;
    padding-top: clamp(80px, 10vh, 140px);
    padding-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
                transform 1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .end-mark.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  .end-mark__diamond {
    color: #c97b2a;
    font-size: 14px;
    display: block;
    margin-bottom: 14px;
    line-height: 1;
  }

  .end-mark__numeral {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #8b7355;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .image-block--01,
    .image-block--07 {
      width: 100%;
    }

    .image-block--02 {
      width: 75%;
    }

    .diptych {
      flex-direction: column;
      gap: 100px;
    }

    .diptych .image-block {
      width: 100%;
      flex: 0 0 100%;
    }

    .diptych .image-block:first-child {
      width: 80%;
      margin-left: auto;
    }

    .diptych .image-block:nth-child(2) {
      width: 80%;
      margin-right: auto;
    }

    .image-block--05 {
      width: 85%;
    }

    .image-block--06 {
      width: 70%;
    }
  }
</style>
</head>
<body>

<div class="gallery-wrapper">

  <!-- Album Header -->
  <header class="album-header">
    <h1 class="album-title">Senior Night</h1>
    <p class="album-meta">Sports &middot; 2025 &middot; Dayton, Ohio</p>
  </header>

  <!-- Image 01 — Full-width hero -->
  <div class="image-block image-block--01" data-reveal>
    <span class="image-number">01</span>
    <img src="/images/senior-night/01.jpg" alt="Senior Night — Image 01" loading="eager">
  </div>

  <!-- Image 02 — Right-aligned medium -->
  <div class="image-block image-block--02" data-reveal>
    <span class="image-number">02</span>
    <img src="/images/senior-night/02.jpg" alt="Senior Night — Image 02" loading="lazy">
  </div>

  <!-- Divider -->
  <div class="divider divider--top" data-reveal></div>

  <!-- Image 03 + 04 — Diptych pair -->
  <div class="diptych">
    <div class="image-block" data-reveal>
      <span class="image-number">03</span>
      <img src="/images/senior-night/03.jpg" alt="Senior Night — Image 03" loading="lazy">
    </div>
    <div class="image-block" data-reveal>
      <span class="image-number">04</span>
      <img src="/images/senior-night/04.jpg" alt="Senior Night — Image 04" loading="lazy">
    </div>
  </div>

  <!-- Image 05 — Left-aligned large -->
  <div class="image-block image-block--05" data-reveal>
    <span class="image-number">05</span>
    <img src="/images/senior-night/05.jpg" alt="Senior Night — Image 05" loading="lazy">
  </div>

  <!-- Divider -->
  <div class="divider divider--bottom" data-reveal></div>

  <!-- Image 06 — Centered medium -->
  <div class="image-block image-block--06" data-reveal>
    <span class="image-number">06</span>
    <img src="/images/senior-night/06.jpg" alt="Senior Night — Image 06" loading="lazy">
  </div>

  <!-- Image 07 — Full-width closer -->
  <div class="image-block image-block--07" data-reveal>
    <span class="image-number">07</span>
    <img src="/images/senior-night/07.jpg" alt="Senior Night — Image 07" loading="lazy">
  </div>

  <!-- End mark -->
  <div class="end-mark" data-reveal>
    <span class="end-mark__diamond">&#9670;</span>
    <span class="end-mark__numeral">VII</span>
  </div>

</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var revealElements = document.querySelectorAll('[data-reveal]');

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.15,
      rootMargin: '0px 0px -40px 0px'
    });

    revealElements.forEach(function (el) {
      observer.observe(el);
    });
  });
</script>

</body>
</html>

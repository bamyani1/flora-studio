<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Night — The Folio — Silk Road Studio</title>
<style>
  /* ——————————————————————————————————————
     Fonts
     —————————————————————————————————————— */
  @font-face {
    font-family: 'Berlingske Serif';
    src: url('/fonts/BerlingskeSerif-Light.woff2') format('woff2');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Berlingske Serif';
    src: url('/fonts/BerlingskeSerif-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Inter';
    src: url('/fonts/InterVariable.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }

  /* ——————————————————————————————————————
     Design Tokens
     —————————————————————————————————————— */
  :root {
    --bg: #141210;
    --surface: #1a1a1a;
    --primary: #c4973b;
    --primary-muted: #a07830;
    --text: #f5f0eb;
    --muted: #8b7355;
    --border: #2e2e2e;
    --font-display: 'Berlingske Serif', Georgia, 'Times New Roman', serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ——————————————————————————————————————
     Reset & Base
     —————————————————————————————————————— */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  html::-webkit-scrollbar {
    display: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ——————————————————————————————————————
     Film Grain
     —————————————————————————————————————— */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.03;
  }

  /* ——————————————————————————————————————
     Vignette
     —————————————————————————————————————— */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    background: radial-gradient(
      ellipse 70% 60% at 50% 50%,
      transparent 0%,
      rgba(20, 18, 16, 0.3) 70%,
      rgba(20, 18, 16, 0.7) 100%
    );
  }

  /* ——————————————————————————————————————
     Page Indicator (fixed, top-right)
     —————————————————————————————————————— */
  .page-indicator {
    position: fixed;
    top: 32px;
    right: 32px;
    z-index: 100;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    transition: opacity 400ms var(--ease-expo);
  }

  .page-indicator.visible {
    opacity: 1;
  }

  /* ——————————————————————————————————————
     Pages — shared
     —————————————————————————————————————— */
  .page {
    position: relative;
    width: 100%;
    height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
    border-top: 1px solid rgba(196, 151, 59, 0.15);
  }

  .page:first-child {
    border-top: none;
  }

  .page-content {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Reveal states */
  .page .reveal {
    opacity: 0;
    transition: opacity 600ms var(--ease-expo);
  }

  .page .reveal-label {
    opacity: 0;
    transition: opacity 400ms var(--ease-expo) 200ms;
  }

  .page.active .reveal,
  .page.active .reveal-label {
    opacity: 1;
  }

  /* Page number watermark */
  .page-number {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 72px;
    color: var(--text);
    opacity: 0;
    line-height: 1;
    pointer-events: none;
    transition: opacity 600ms var(--ease-expo) 300ms;
  }

  .page.active .page-number {
    opacity: 0.06;
  }

  /* Shared label style */
  .label {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ——————————————————————————————————————
     Page 1 — Title Page
     —————————————————————————————————————— */
  .title-page .page-content {
    flex-direction: column;
    gap: 0;
  }

  .title-text {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: clamp(4rem, 10vw, 8rem);
    line-height: 0.95;
    -webkit-text-stroke: 1.5px var(--text);
    color: transparent;
    text-align: center;
    clip-path: inset(0 100% 0 0);
    transition: clip-path 1.2s var(--ease-expo);
  }

  .title-page.active .title-text {
    clip-path: inset(0 0 0 0);
  }

  .title-rule {
    width: 80px;
    height: 1px;
    background: var(--primary);
    margin-top: 40px;
    opacity: 0;
    transition: opacity 800ms var(--ease-expo) 600ms;
  }

  .title-page.active .title-rule {
    opacity: 1;
  }

  .title-studio {
    margin-top: 28px;
    opacity: 0;
    transition: opacity 600ms var(--ease-expo) 800ms;
  }

  .title-page.active .title-studio {
    opacity: 1;
  }

  .title-count {
    margin-top: 12px;
    opacity: 0;
    transition: opacity 600ms var(--ease-expo) 1000ms;
  }

  .title-page.active .title-count {
    opacity: 1;
  }

  /* ——————————————————————————————————————
     Page 2, 4 — Full-Bleed
     —————————————————————————————————————— */
  .full-bleed .page-content {
    padding: 0;
  }

  .full-bleed-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .full-bleed-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(20, 18, 16, 0.8) 0%, transparent 40%);
    pointer-events: none;
  }

  .full-bleed-label {
    position: absolute;
    bottom: 40px;
    left: 40px;
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 14px;
    color: var(--text);
    opacity: 0;
    transition: opacity 600ms var(--ease-expo) 200ms;
  }

  .page.active .full-bleed-label {
    opacity: 0.5;
  }

  /* ——————————————————————————————————————
     Page 3, 7 — Centered Plate
     —————————————————————————————————————— */
  .centered-plate .page-content {
    flex-direction: column;
    gap: 0;
  }

  .plate-image {
    width: 50%;
    max-height: 70vh;
    object-fit: contain;
  }

  .plate-image.wider {
    width: 55%;
  }

  .plate-label {
    margin-top: 24px;
  }

  /* ——————————————————————————————————————
     Page 5 — Diptych
     —————————————————————————————————————— */
  .diptych .page-content {
    flex-direction: column;
    gap: 0;
  }

  .diptych-pair {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2vw;
    width: 100%;
    position: relative;
  }

  .diptych-image {
    width: 43vw;
    max-height: 65vh;
    object-fit: contain;
  }

  .diptych-separator {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 40px;
    background: var(--primary);
    pointer-events: none;
  }

  .diptych-label {
    margin-top: 28px;
  }

  /* ——————————————————————————————————————
     Page 6 — Detail Crop
     —————————————————————————————————————— */
  .detail-crop .page-content {
    justify-content: space-between;
    align-items: center;
    padding: 0 10%;
  }

  .detail-text-side {
    position: relative;
    max-width: 300px;
    text-align: left;
  }

  .detail-ghost-number {
    position: absolute;
    top: -40px;
    left: -10px;
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 96px;
    line-height: 1;
    color: var(--primary);
    opacity: 0;
    pointer-events: none;
    transition: opacity 600ms var(--ease-expo) 200ms;
  }

  .page.active .detail-ghost-number {
    opacity: 0.1;
  }

  .detail-text-side p {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.35;
    color: var(--text);
    position: relative;
    z-index: 1;
  }

  .detail-image-side {
    display: flex;
    justify-content: flex-end;
  }

  .detail-image {
    width: 32vw;
    max-height: 72vh;
    object-fit: contain;
  }

  /* ——————————————————————————————————————
     Page 8 — Colophon
     —————————————————————————————————————— */
  .colophon .page-content {
    flex-direction: column;
    gap: 0;
  }

  .colophon-ornament {
    font-size: 14px;
    color: var(--primary);
    line-height: 1;
  }

  .colophon-published {
    margin-top: 32px;
  }

  .colophon-studio {
    margin-top: 12px;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 300;
    font-size: 24px;
    color: var(--text);
  }

  .colophon-rule {
    width: 60px;
    height: 1px;
    background: var(--primary);
    margin-top: 32px;
  }

  .colophon-year {
    margin-top: 20px;
  }

  /* ——————————————————————————————————————
     Mobile Adaptations
     —————————————————————————————————————— */
  @media (max-width: 768px) {
    .title-text {
      font-size: clamp(2.5rem, 8vw, 5rem);
      -webkit-text-stroke: 1px var(--text);
    }

    .plate-image {
      width: 85% !important;
    }

    .plate-image.wider {
      width: 85% !important;
    }

    .diptych-pair {
      flex-direction: column;
      gap: 24px;
    }

    .diptych-image {
      width: 85vw;
      max-height: 35vh;
    }

    .diptych-separator {
      display: none;
    }

    .detail-crop .page-content {
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      padding: 0 8%;
    }

    .detail-text-side {
      order: 1;
      text-align: center;
      max-width: 100%;
    }

    .detail-ghost-number {
      left: 50%;
      transform: translateX(-50%);
    }

    .detail-text-side p {
      font-size: 24px;
    }

    .detail-image-side {
      order: 2;
      justify-content: center;
    }

    .detail-image {
      width: 75vw;
      max-height: 50vh;
    }

    .full-bleed-label {
      bottom: 28px;
      left: 24px;
    }

    .page-number {
      font-size: 48px;
      bottom: 32px;
    }

    .page-indicator {
      top: 20px;
      right: 20px;
      font-size: 10px;
    }
  }
</style>
</head>
<body>

  <!-- Film Grain -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)" />
  </svg>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Page Indicator -->
  <div class="page-indicator" id="pageIndicator">I / VIII</div>


  <!-- ═══════════════════════════════════
       PAGE 1 — Title Page
       ═══════════════════════════════════ -->
  <section class="page title-page" data-page="1" data-numeral="I">
    <div class="page-content">
      <h1 class="title-text">SENIOR NIGHT</h1>
      <div class="title-rule"></div>
      <span class="label title-studio">Silk Road Studio</span>
      <span class="label title-count">[ SEVEN PHOTOGRAPHS ]</span>
    </div>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 2 — Full-Bleed (Image 01)
       ═══════════════════════════════════ -->
  <section class="page full-bleed" data-page="2" data-numeral="II">
    <div class="page-content">
      <img class="full-bleed-image reveal" src="/images/senior-night/01.jpg" alt="Senior Night — Photograph 01" loading="eager" />
      <div class="full-bleed-gradient"></div>
      <span class="full-bleed-label">01</span>
    </div>
    <span class="page-number">2</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 3 — Centered Plate (Image 02)
       ═══════════════════════════════════ -->
  <section class="page centered-plate" data-page="3" data-numeral="III">
    <div class="page-content">
      <img class="plate-image reveal" src="/images/senior-night/02.jpg" alt="Senior Night — Photograph 02" loading="lazy" />
      <span class="label plate-label reveal-label">[ PLATE II ]</span>
    </div>
    <span class="page-number">3</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 4 — Full-Bleed (Image 03)
       ═══════════════════════════════════ -->
  <section class="page full-bleed" data-page="4" data-numeral="IV">
    <div class="page-content">
      <img class="full-bleed-image reveal" src="/images/senior-night/03.jpg" alt="Senior Night — Photograph 03" loading="lazy" />
      <div class="full-bleed-gradient"></div>
      <span class="full-bleed-label">03</span>
    </div>
    <span class="page-number">4</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 5 — Diptych (Images 04 + 05)
       ═══════════════════════════════════ -->
  <section class="page diptych" data-page="5" data-numeral="V">
    <div class="page-content">
      <div class="diptych-pair reveal">
        <img class="diptych-image" src="/images/senior-night/04.jpg" alt="Senior Night — Photograph 04" loading="lazy" />
        <div class="diptych-separator"></div>
        <img class="diptych-image" src="/images/senior-night/05.jpg" alt="Senior Night — Photograph 05" loading="lazy" />
      </div>
      <span class="label diptych-label reveal-label">[ PLATES IV — V ]</span>
    </div>
    <span class="page-number">5</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 6 — Detail Crop (Image 06)
       ═══════════════════════════════════ -->
  <section class="page detail-crop" data-page="6" data-numeral="VI">
    <div class="page-content">
      <div class="detail-text-side reveal">
        <span class="detail-ghost-number">06</span>
        <p>The quiet<br>between<br>moments</p>
      </div>
      <div class="detail-image-side">
        <img class="detail-image reveal" src="/images/senior-night/06.jpg" alt="Senior Night — Photograph 06" loading="lazy" />
      </div>
    </div>
    <span class="page-number">6</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 7 — Centered Plate (Image 07)
       ═══════════════════════════════════ -->
  <section class="page centered-plate" data-page="7" data-numeral="VII">
    <div class="page-content">
      <img class="plate-image wider reveal" src="/images/senior-night/07.jpg" alt="Senior Night — Photograph 07" loading="lazy" />
      <span class="label plate-label reveal-label">[ PLATE VII ]</span>
    </div>
    <span class="page-number">7</span>
  </section>


  <!-- ═══════════════════════════════════
       PAGE 8 — Colophon
       ═══════════════════════════════════ -->
  <section class="page colophon" data-page="8" data-numeral="VIII">
    <div class="page-content">
      <span class="colophon-ornament reveal">&#9670;</span>
      <span class="label colophon-published reveal-label">Published by</span>
      <span class="colophon-studio reveal-label">Silk Road Studio</span>
      <div class="colophon-rule reveal-label"></div>
      <span class="label colophon-year reveal-label">MMXXVI</span>
    </div>
  </section>


  <!-- ═══════════════════════════════════
       Script — Observer & Page Indicator
       ═══════════════════════════════════ -->
  <script>
    (function () {
      const pages = document.querySelectorAll('.page');
      const indicator = document.getElementById('pageIndicator');
      const totalNumeral = 'VIII';

      // Show page indicator after delay
      setTimeout(function () {
        indicator.classList.add('visible');
      }, 400);

      // IntersectionObserver — threshold 0.5
      const observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            // Activate this page
            entry.target.classList.add('active');

            // Update page indicator
            const numeral = entry.target.getAttribute('data-numeral');
            if (numeral) {
              indicator.textContent = numeral + ' / ' + totalNumeral;
            }
          } else {
            // Deactivate when leaving
            entry.target.classList.remove('active');
          }
        });
      }, {
        threshold: 0.5
      });

      pages.forEach(function (page) {
        observer.observe(page);
      });
    })();
  </script>

</body>
</html>

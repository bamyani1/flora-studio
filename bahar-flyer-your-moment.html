<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Moment — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: linear-gradient(165deg, #242820 0%, #1c2018 100%);
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 5;
    }
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, transparent 30%, rgba(16, 19, 12, 0.25) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Photo — right side, slightly overlapping center */
    .photo-column {
      position: absolute;
      top: 0.65in;
      right: 0;
      bottom: 0.65in;
      width: 48%;
      overflow: hidden;
      z-index: 1;
    }
    .photo-column img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }
    .photo-column::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #242820 0%, rgba(36,40,32,0.6) 15%, transparent 40%),
                  linear-gradient(to bottom, rgba(28,32,24,0.4) 0%, transparent 10%, transparent 90%, rgba(28,32,24,0.4) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Left content */
    .left-content {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 58%;
      padding: 0.85in;
      display: flex;
      flex-direction: column;
      z-index: 3;
    }

    .top-brand {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: auto;
    }
    .logo-ornament {
      width: 120px;
      opacity: 0.4;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
    }

    .main-content {
      margin-bottom: auto;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: #e8dfd4;
      margin-bottom: 40px;
    }
    .headline-word {
      display: block;
      font-size: 86px;
    }
    .headline-word.indent {
      padding-left: 0.6in;
    }
    .headline-word em {
      font-style: italic;
      font-weight: 300;
      color: #c97b2a;
    }

    .separator {
      width: 40px;
      height: 1px;
      background: #3a4034;
      margin-bottom: 28px;
    }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 28px;
    }
    .service-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .service-dash {
      width: 14px;
      height: 1px;
      background: #3a4034;
      flex-shrink: 0;
    }
    .service-name {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: #8a9878;
    }

    .body-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 15px;
      line-height: 1.7;
      color: #8a9878;
      max-width: 3.2in;
    }

    .bottom-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>

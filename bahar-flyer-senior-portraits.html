<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Portraits — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #161a12;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 4;
    }

    /* Photo section — top 65% */
    .photo-section {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .photo-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .photo-section::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(22,26,18,0.3) 0%, transparent 15%, transparent 55%, #161a12 100%),
                  linear-gradient(to right, rgba(22,26,18,0.15) 0%, transparent 15%, transparent 85%, rgba(22,26,18,0.15) 100%);
      pointer-events: none;
    }

    /* Wordmark floating on photo top-left */
    .wordmark-float {
      position: absolute;
      top: 0.85in;
      left: 0.85in;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .logo-ornament {
      width: 100px;
      opacity: 0.4;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      opacity: 0.85;
    }

    /* Bottom text section */
    .text-section {
      padding: 32px 0.85in 0.85in 0.85in;
      position: relative;
      z-index: 2;
    }

    .headline-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 56px;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #e8dfd4;
    }
    .headline em {
      font-style: italic;
      font-weight: 300;
    }
    .year-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 42px;
      letter-spacing: -0.02em;
      color: #3a4034;
    }

    .copper-line {
      width: 48px;
      height: 1px;
      background: #c97b2a;
      margin-bottom: 24px;
    }

    .body-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 15px;
      line-height: 1.7;
      color: #8a9878;
      max-width: 4.5in;
      margin-bottom: 28px;
    }

    .bottom-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .contact-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
    }
    .contact-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #3a4034;
    }
    .qr-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>

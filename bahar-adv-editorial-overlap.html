<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahar Studio – Editorial Overlap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Inter', sans-serif;
      background: #242820;
      color: #e8dfd4;
      line-height: 1.6;
      height: 100%;
      width: 100%;
    }

    @page {
      size: 8.5in 11in;
      margin: 0;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .container {
      width: 8.5in;
      height: 11in;
      margin: 0 auto;
      background: #242820;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* FILM GRAIN */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.03;
      mix-blend-mode: screen;
      z-index: 1000;
    }

    /* VIGNETTE */
    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.5);
    }

    /* HEADER */
    .header {
      flex: 0 0 auto;
      padding: 0.6in 0.6in 0.3in 0.6in;
      z-index: 10;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0;
    }

    .wordmark-logo {
      width: 14px;
      height: 14px;
    }

    /* PHOTO SECTION WITH OVERLAP */
    .photo-section {
      position: relative;
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      margin: 0;
      z-index: 20;
      overflow: visible;
    }

    .headline-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      padding: 0.5rem 0.6in 0 0.6in;
      display: flex;
      align-items: flex-start;
      height: auto;
      overflow: visible;
      pointer-events: auto;
    }

    .headline-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(16, 19, 12, 0.65);
      z-index: 29;
      pointer-events: none;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 150px;
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 0.88;
      color: #e8dfd4;
      text-transform: capitalize;
      margin: 0;
      padding: 0.4rem 0;
      position: relative;
      z-index: 31;
      max-width: 95%;
    }

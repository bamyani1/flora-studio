<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahar Studio — Photography Worth Keeping</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
      .screen-only { display: none; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: linear-gradient(175deg, #1c2018 0%, #242820 40%, #272c22 100%);
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0.85in;
    }
    /* Film grain */
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 1;
    }
    /* Vignette */
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(16, 19, 12, 0.3) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Warm glow */
    .warm-glow {
      position: absolute;
      top: 30%;
      left: 40%;
      transform: translate(-50%, -50%);
      width: 6in;
      height: 5in;
      background: radial-gradient(ellipse, rgba(201, 123, 42, 0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Geometric diamond accent */
    .geo-accent {
      position: absolute;
      top: 1.5in;
      right: 0.85in;
      width: 52px;
      height: 52px;
      border: 1px solid #3a4034;
      transform: rotate(45deg);
      z-index: 2;
    }
    .geo-accent::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px;
      background: #c97b2a;
      border-radius: 50%;
    }

    /* Top: large wordmark */
    .wordmark-large {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 36px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e8dfd4;
      position: relative;
      z-index: 2;
      margin-bottom: 16px;
    }
    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a9878;
      position: relative;
      z-index: 2;
    }

    /* Headline section */
    .headline-section {
      margin-top: auto;
      margin-bottom: 56px;
      position: relative;
      z-index: 2;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 64px;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #e8dfd4;
      max-width: 5in;
    }
    .headline em {
      font-style: italic;
      font-weight: 300;
    }

    /* Thin separator */
    .separator {
      width: 40px;
      height: 1px;
      background: #3a4034;
      margin: 40px 0;
      position: relative;
      z-index: 2;
    }

    /* Service list */
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 56px;
      position: relative;
      z-index: 2;
    }
    .service-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .service-dash {
      width: 16px;
      height: 1px;
      background: #3a4034;
      flex-shrink: 0;
    }
    .service-name {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: #8a9878;
    }

    /* Bottom */
    .bottom-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 2;
    }
    .bottom-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .bottom-tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 16px;
      color: #8a9878;
    }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
    }
    .contact-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #3a4034;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="warm-glow"></div>
    <div class="geo-accent"></div>

    <div class="wordmark-large">Bahar Studio</div>
    <div class="tagline">Photography Worth Keeping</div>

    <div class="headline-section">
      <div class="headline">Every story deserves to be held in <em>light</em></div>
    </div>

    <div class="separator"></div>

    <div class="service-list">
      <div class="service-item">
        <div class="service-dash"></div>
        <span class="service-name">Portrait Sessions</span>
      </div>
      <div class="service-item">
        <div class="service-dash"></div>
        <span class="service-name">Wedding &amp; Engagement</span>
      </div>
      <div class="service-item">
        <div class="service-dash"></div>
        <span class="service-name">Family &amp; Lifestyle</span>
      </div>
      <div class="service-item">
        <div class="service-dash"></div>
        <span class="service-name">Maternity &amp; Newborn</span>
      </div>
      <div class="service-item">
        <div class="service-dash"></div>
        <span class="service-name">Creative &amp; Editorial</span>
      </div>
    </div>

    <div class="bottom-section">
      <div class="bottom-left">
        <div class="bottom-tagline">Intentional photography for people who feel deeply.</div>
        <div class="contact-row">
          <span class="contact-item">baharstudio.com</span>
          <div class="contact-dot"></div>
          <span class="contact-item">@baharstudio</span>
        </div>
      </div>
      <div class="qr-section">
        <div class="qr-wrapper">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://baharstudio.com/book&format=png&qzone=1" alt="Scan to book" />
        </div>
        <span class="qr-label">Scan to book</span>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahar Studio — Graduation & Senior Portraits</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    body {
      background: #242820;
      font-family: 'Inter', sans-serif;
      color: #e8dfd4;
      overflow: hidden;
    }
    .page {
      position: relative;
      width: 8.5in;
      height: 11in;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: #242820;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }
    /* ═════════════════════════════════════════════════════════════ */
    /* BAND 1: TOP — HEADLINE (30%) — DOMINANT & DRAMATIC */
    /* ═════════════════════════════════════════════════════════════ */
    .band-top {
      flex: 0 0 30%;
      background: #10130c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 28px 60px;
      text-align: center;
      border-bottom: 1px solid;
      border-image: linear-gradient(90deg, rgba(58, 64, 52, 0), rgba(58, 64, 52, 1) 20%, rgba(58, 64, 52, 1) 80%, rgba(58, 64, 52, 0)) 1;
    }
    .header-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .branch-logo img {
      width: 28px;
      height: auto;
      opacity: 0.85;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
    }
    /* HEADLINE: 128px FILLS THE SPACE */
    .band-top h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 128px;
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 0.92;
      color: #e8dfd4;
      margin: 6px 0 0 0;
    }
    /* SUBHEADING: INCREASED TO 22px FOR PROMINENCE */
    .subheading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #c97b2a;
      margin-top: 6px;
      font-style: italic;
    }
    /* ═════════════════════════════════════════════════════════════ */
    /* BAND 2: PHOTO — LETTERBOX CINEMA FRAME (35%) */
    /* ═════════════════════════════════════════════════════════════ */
    .band-photo {
      flex: 0 0 35%;
      background: #10130c;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Pillarbox padding creates cinema frame effect */
      padding: 10px 0;
    }
    .photo-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10130c;
    }
    /* PHOTO: Object-fit with letterbox positioning */
    .photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 45%;
      display: block;
    }
    /* FILM GRAIN: Enhanced for visible texture */
    .photo-grain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="5" result="noise"/><feColorMatrix in="noise" type="saturate" values="0.25"/></filter><rect width="100%" height="100%" fill="%23000" opacity="0.08" filter="url(%23noise)"/></svg>');
      pointer-events: none;
      mix-blend-mode: overlay;
    }
    /* VIGNETTE: Deep radial gradient for cinema feel */
    .photo-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      mix-blend-mode: multiply;
    }
    .band-photo::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(58, 64, 52, 0), rgba(58, 64, 52, 1) 20%, rgba(58, 64, 52, 1) 80%, rgba(58, 64, 52, 0));
    }
    /* ═════════════════════════════════════════════════════════════ */
    /* BAND 3: BOTTOM — INFO & CONTACT (35%) — REFINED */
    /* ═════════════════════════════════════════════════════════════ */
    .band-bottom {
      flex: 0 0 35%;
      background: #1c2018;
      padding: 33px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-top: 1px solid;
      border-image: linear-gradient(90deg, rgba(58, 64, 52, 0), rgba(58, 64, 52, 1) 20%, rgba(58, 64, 52, 1) 80%, rgba(58, 64, 52, 0)) 1;
    }
    .bottom-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
    }
    .bottom-text {
      flex: 1;
    }
    .bottom-text p {
      font-size: 11px;
      line-height: 1.5;
      color: #e8dfd4;
      font-weight: 300;
    }
    /* SERVICE LABEL: INCREASED TO 11px */
    .service-label {
      color: #8a9878;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 300;
    }
    .service-list {
      font-size: 10px;
      color: #8a9878;
      line-height: 1.6;
      list-style: none;
    }
    .service-list li::before {
      content: '• ';
      color: #8a9878;
      margin-right: 6px;
    }
    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .qr-box {
      width: 84px;
      height: 84px;
      background: #e8dfd4;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #3a4034;
    }
    .qr-box img {
      width: 80px;
      height: 80px;
    }
    .qr-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a9878;
      font-weight: 400;
    }
    .contact {
      margin-top: 10px;
      text-align: center;
    }
    .contact-link {
      font-size: 10px;
      color: #e8dfd4;
      text-decoration: none;
      display: block;
      margin: 2px 0;
      font-weight: 300;
    }
    .contact-link:hover {
      color: #e8dfd4;
    }
    .contact-social {
      font-size: 9px;
      color: #8a9878;
      margin-top: 4px;
      font-weight: 300;
    }
    @media print {
      body { margin: 0; padding: 0; background: white; }
      .page { width: 8.5in; height: 11in; margin: 0; box-shadow: none; }
    }
  </style>
</head>

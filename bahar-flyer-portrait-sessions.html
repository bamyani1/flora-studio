<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portrait Sessions — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
      .screen-only { display: none; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #242820;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 1;
    }
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 35%, rgba(16, 19, 12, 0.3) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .warm-glow {
      position: absolute;
      top: 36%;
      left: 32%;
      transform: translate(-50%, -50%);
      width: 7in;
      height: 5.5in;
      background: radial-gradient(ellipse, rgba(201, 123, 42, 0.025) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      padding: 0.85in 0.85in 0 0.85in;
      position: relative;
      z-index: 2;
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 0.85in;
      position: relative;
      z-index: 2;
    }
    .headline-word {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 104px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: #e8dfd4;
    }
    .headline-word.offset {
      padding-left: 1.65in;
      margin-top: 4px;
    }
    .headline-word em {
      font-style: italic;
      font-weight: 300;
      color: #c97b2a;
    }
    .subline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 18px;
      line-height: 1.65;
      color: #8a9878;
      margin-top: 52px;
      max-width: 3.6in;
    }
    .vertical-accent {
      position: absolute;
      right: 1.15in;
      top: 2.8in;
      width: 1px;
      height: 1.6in;
      background: linear-gradient(to bottom, transparent, #3a4034 15%, #3a4034 85%, transparent);
      z-index: 2;
    }
    .bottom {
      padding: 0 0.85in 0.85in 0.85in;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 2;
    }
    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #8a9878;
    }
    .contact-separator {
      width: 20px;
      height: 1px;
      background: #3a4034;
      margin: 2px 0;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="warm-glow"></div>
    <div class="vertical-accent"></div>
    <div class="wordmark">Bahar Studio</div>
    <div class="hero">
      <span class="headline-word">Portrait</span>
      <span class="headline-word offset"><em>Sessions</em></span>
      <p class="subline">Where the quietest version of you becomes the most beautiful frame we've ever taken.</p>
    </div>
    <div class="bottom">
      <div class="contact-block">
        <span class="contact-item">baharstudio.com</span>
        <div class="contact-separator"></div>
        <span class="contact-item">@baharstudio</span>
      </div>
      <div class="qr-section">
        <div class="qr-wrapper">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://baharstudio.com/book&format=png&qzone=1" alt="Scan to book a session" />
        </div>
        <span class="qr-label">Scan to book</span>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahar Studio - Vertical Axis Modernist Flyer FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media print {
            html, body {
                width: 8.5in;
                height: 11in;
                margin: 0;
                padding: 0;
            }
        }

        body {
            font-family: "Inter", sans-serif;
            background: #242820;
            color: #e8dfd4;
            line-height: 1.5;
        }

        .flyer {
            width: 8.5in;
            height: 11in;
            background: #242820;
            display: flex;
            flex-direction: row;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* LEFT SIDE: PHOTO STRIP */
        .photo-column {
            width: 3.6in;
            height: 11in;
            position: relative;
            padding: 0.65in 0;
            background: #1c2018;
            overflow: hidden;
            flex-shrink: 0;
        }

        .photo-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #161a12;
            border-right: 5px solid #c97b2a;
        }

        .photo-strip {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Aggressive vignette effect */
        .photo-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 20%, rgba(22, 26, 18, 0.65) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Film grain overlay */
        .photo-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="100" height="100" fill="%23000" opacity="0.08" filter="url(%23grain)" /></svg>');
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        /* RIGHT SIDE: TYPOGRAPHY COLUMN */
        .content-column {
            flex: 1;
            padding: 1.5in 0.9in 1in 0.9in;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            background: #242820;
            border-left: 5px solid #c97b2a;
        }

        /* VERTICAL AXIS ACCENT TEXT */
        .vertical-accent {
            position: absolute;
            left: -1.15in;
            top: 2in;
            width: 1.2in;
            height: 5in;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .vertical-word {
            font-family: "Cormorant Garamond", serif;
            font-size: 4.5rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            color: #c97b2a;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            white-space: nowrap;
            line-height: 0.9;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transform-origin: center center;
        }

        /* WORDMARK & LOGO */
        .header {
            margin-bottom: 1.25rem;
        }

        .brand-lock {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.5rem;
            height: 1.2rem;
        }

        .branch-logo {
            width: 2.8rem;
            height: 1.2rem;
            flex-shrink: 0;
            display: block;
        }

        .wordmark {
            font-family: "Cormorant Garamond", serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #e8dfd4;
            line-height: 1.2;
        }

        /* HEADLINE */
        .headline {
            margin-bottom: 1.2rem;
            line-height: 0.92;
        }

        .headline h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: 3.6rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            color: #e8dfd4;
            margin: 0;
            line-height: 0.92;
        }

        /* SUBLINE - Restored Poetry */
        .subline {
            font-size: 0.75rem;
            color: #8a9878;
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 1.2rem;
            max-width: 3.8in;
            font-style: italic;
        }

        /* FOOTER SECTION */
        .footer {
            margin-top: auto;
            padding-top: 1.2rem;
        }

        .qr-section {
            margin-bottom: 1rem;
        }

        .qr-wrapper {
            width: 1.2in;
            height: 1.2in;
            background: #e8dfd4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.6rem;
            border: 2px solid #3a4034;
        }

        .qr-code {
            width: 84px;
            height: 84px;
            background: white;
        }

        .qr-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8a9878;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .contact-section {
            display: flex;
            gap: 1.6rem;
        }

        .contact-block {
            flex: 1;
        }

        .contact-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8a9878;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .contact-info {
            color: #e8dfd4;
            font-weight: 400;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            .flyer {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maternity & Newborn — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
      .screen-only { display: none; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #161a12;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 1in 1.2in;
    }
    /* Film grain */
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 1;
    }
    /* Vignette */
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, transparent 25%, rgba(10, 13, 8, 0.4) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Warm glow — centered, barely visible */
    .warm-glow {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6in;
      height: 6in;
      background: radial-gradient(ellipse, rgba(201, 123, 42, 0.03) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top */
    .top-section {
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      opacity: 0.7;
    }

    /* Center */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .service-label {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c97b2a;
      margin-bottom: 56px;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 78px;
      line-height: 0.94;
      letter-spacing: -0.03em;
      color: #e8dfd4;
    }
    .headline em {
      font-style: italic;
      font-weight: 300;
    }
    .headline-line2 {
      display: block;
      margin-top: 6px;
    }

    /* Vertical accent line */
    .accent-line {
      width: 1px;
      height: 56px;
      background: linear-gradient(to bottom, transparent, #3a4034 30%, #3a4034 70%, transparent);
      margin: 44px 0;
    }

    .body-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 18px;
      line-height: 1.7;
      color: #8a9878;
      max-width: 4in;
      text-align: center;
    }

    /* Bottom */
    .bottom-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
    }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>
<body>
  <div class="flyer">
    <div class="warm-glow"></div>

    <div class="top-section">
      <div class="wordmark">Bahar Studio</div>
    </div>

    <div class="center">
      <div class="service-label">Maternity &amp; Newborn</div>
      <div class="headline">
        <span>The Smallest</span>
        <span class="headline-line2"><em>Beginnings</em></span>
      </div>
      <div class="accent-line"></div>
      <p class="body-text">Before they grow. Before the days blur together. We hold this season still — tender, quiet, and entirely yours.</p>
    </div>

    <div class="bottom-section">
      <div class="contact-block">
        <span class="contact-item">baharstudio.com</span>
        <span class="contact-item">@baharstudio</span>
      </div>
      <div class="qr-section">
        <div class="qr-wrapper">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://baharstudio.com/book&format=png&qzone=1" alt="Scan to book" />
        </div>
        <span class="qr-label">Reserve yours</span>
      </div>
    </div>
  </div>
</body>
</html>

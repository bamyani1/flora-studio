<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduation Sessions — Bahar Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: 8.5in 11in; margin: 0; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .flyer { break-after: page; }
    }
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #111;
    }
    .flyer {
      width: 8.5in;
      height: 11in;
      background: #1c2018;
      color: #e8dfd4;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    /* Film grain */
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 3;
    }
    .flyer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 45%, transparent 30%, rgba(16, 19, 12, 0.35) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* Left: Photo */
    .photo-panel {
      position: relative;
      overflow: hidden;
    }
    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }
    .photo-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, #1c2018 100%),
                  linear-gradient(to top, #1c2018 0%, transparent 20%),
                  linear-gradient(to bottom, #1c2018 0%, transparent 12%);
      pointer-events: none;
    }

    /* Right: Content */
    .content-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0.85in 0.85in 0.85in 0.3in;
      position: relative;
      z-index: 2;
    }

    .logo-ornament {
      width: 120px;
      height: auto;
      opacity: 0.35;
      margin-bottom: 16px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8dfd4;
      margin-bottom: 80px;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: #e8dfd4;
      margin-bottom: 44px;
    }
    .headline-line {
      display: block;
      font-size: 72px;
    }
    .headline-line.large {
      font-size: 88px;
    }
    .headline-line em {
      font-style: italic;
      font-weight: 300;
      color: #c97b2a;
    }

    .subline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 16px;
      line-height: 1.7;
      color: #8a9878;
      max-width: 3in;
      margin-bottom: auto;
    }

    .bottom-content {
      margin-top: 56px;
    }
    .contact-item {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #8a9878;
      display: block;
      margin-bottom: 4px;
    }
    .qr-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-top: 20px;
    }
    .qr-wrapper {
      width: 84px;
      height: 84px;
      padding: 6px;
      background: #e8dfd4;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a9878;
    }
  </style>
</head>
